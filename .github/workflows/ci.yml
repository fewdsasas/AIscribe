name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npm run typecheck

      - name: Run Prettier check
        run: npm run format:check

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run unit tests (excluding stress tests)
        run: npx vitest run --exclude tests/integration/stress-*.test.ts --exclude tests/integration/memory-*.test.ts --reporter=verbose

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  stress-tests:
    name: Stress & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run stress tests (DB + LLM + IPC)
        run: npx vitest run tests/integration/stress-db.test.ts tests/integration/stress-llm.test.ts tests/integration/stress-ipc.test.ts --reporter=verbose
        env:
          CI_STRESS_TEST: 'true'

      - name: Run integration tests
        run: npx vitest run tests/integration/ --exclude tests/integration/stress-*.test.ts --reporter=verbose

      - name: Run memory profile tests
        run: npx vitest run tests/integration/memory-*.test.ts --reporter=verbose

      - name: Upload stress test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stress-test-logs
          path: |
            tests/temp/
            压力测试报告.md
          if-no-files-found: ignore
          retention-days: 14

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests, stress-tests]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build application
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: out/
          if-no-files-found: ignore
