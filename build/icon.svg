<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#211b13"/>
      <stop offset="70%" stop-color="#3d3224"/>
      <stop offset="100%" stop-color="#5c4a36"/>
    </linearGradient>
    <radialGradient id="sparkle" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#e8a84a"/>
      <stop offset="60%" stop-color="#d48a2a"/>
      <stop offset="100%" stop-color="#b06e20" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 背景 -->
  <rect x="0" y="0" width="512" height="512" rx="80" ry="80" fill="#fcfbf9"/>
  <rect x="0" y="0" width="512" height="512" rx="80" ry="80" fill="none" stroke="#e8dfd3" stroke-width="2"/>

  <!-- A 左斜笔 -->
  <path d="M168 380 Q175 360 190 320 Q205 280 220 240 Q235 200 248 165 Q255 145 260 130 Q265 115 268 105"
        stroke="url(#ink)" stroke-width="28" stroke-linecap="round" fill="none" opacity="0.95"/>
  <path d="M180 360 Q190 330 205 290 Q215 260 230 225"
        stroke="#3d3224" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.3"/>

  <!-- A 右斜笔 -->
  <path d="M268 105 Q280 130 295 160 Q310 190 325 225 Q340 260 350 290 Q360 320 368 345 Q372 360 375 375"
        stroke="url(#ink)" stroke-width="26" stroke-linecap="round" fill="none" opacity="0.95"/>
  <path d="M300 170 Q315 200 330 240 Q345 275 355 300"
        stroke="#3d3224" stroke-width="7" stroke-linecap="round" fill="none" opacity="0.25"/>

  <!-- A 横笔 -->
  <path d="M205 285 Q220 280 240 278 Q260 276 280 278 Q300 280 315 285 Q325 288 330 290"
        stroke="url(#ink)" stroke-width="20" stroke-linecap="round" fill="none" opacity="0.85"/>
  <path d="M215 283 Q240 278 270 277 Q300 278 320 283"
        stroke="#3d3224" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.2"/>

  <!-- A 顶端小横 -->
  <path d="M255 108 Q260 102 265 100 Q270 98 275 100"
        stroke="#3d3224" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.6"/>

  <!-- 星芒 -->
  <circle cx="345" cy="165" r="12" fill="url(#sparkle)" opacity="0.9"/>
  <circle cx="345" cy="165" r="22" fill="url(#sparkle)" opacity="0.15"/>
  <line x1="345" y1="140" x2="345" y2="190" stroke="#e8a84a" stroke-width="2" opacity="0.5"/>
  <line x1="320" y1="165" x2="370" y2="165" stroke="#e8a84a" stroke-width="2" opacity="0.5"/>
  <line x1="327" y1="147" x2="363" y2="183" stroke="#e8a84a" stroke-width="1.5" opacity="0.3"/>
  <line x1="327" y1="183" x2="363" y2="147" stroke="#e8a84a" stroke-width="1.5" opacity="0.3"/>

  <!-- 墨点装饰 -->
  <circle cx="200" cy="150" r="3" fill="#3d3224" opacity="0.3"/>
  <circle cx="180" cy="170" r="2" fill="#3d3224" opacity="0.2"/>

  <!-- 底部 scribe 手写签名 -->
  <text x="256" y="430" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="28" font-style="italic" fill="#9a8369" opacity="0.6"
        letter-spacing="4">scribe</text>
</svg>
